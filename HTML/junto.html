<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="../JS/juntoScript.js" defer></script>
  <title>Dashboard Energía y Agua</title>
  <link rel="stylesheet" href="../CSS/juntoCSS.css">
</head>

<body>


  <nav class="nav">
    <a href="../index.html">← Volver al Index</a>
  </nav>

  <h1>CALCULADORA</h1>


<div class="container">

  <!-- SECCIÓN 1: FECHAS + CALENDARIO + ESTACIONALES -->
  <div class="section">

    <div class="block">
      <label>Fecha inicio:</label>
      <input type="date" id="start">

      <label>Fecha fin:</label>
      <input type="date" id="end">

    </div>
<div class="block">
      <h5>CALENDARIO FESTIVOS</h5>

      <div id="calendar">

        <div class="cal-header">
          <button onclick="changeMonth(-1)">◀</button>
          <div id="monthLabel"></div>
          <button onclick="changeMonth(1)">▶</button>
        </div>

        <div class="grid" id="daysHeader">
          <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
        </div>

        <div class="grid" id="calendarGrid"></div>

        <button class="small" onclick="toggleSelected()">Añadir / Quitar festivo</button>
      </div>
  </div>

    <div class="block">
            <label>Paneles solares:</label>
      <input type="number" id="panels" value="136">
    </div>



<div class="block">

  <h3>GASTOS ESTACIONALES</h3>

  <div class="estaciones">

    <!-- INVIERNO -->
    <div class="estacion">
      <h4>Invierno</h4>

      <label>Iluminación Natural</label>
      <select id="inv_ilum">
        <option value="-0.10">Más</option>
        <option value="0">Normal</option>
        <option value="0.10" selected>Menos</option>
      </select>

      <label>Calefacción</label>
      <select id="inv_heat">
        <option value="0">No</option>
        <option value="0.10">Baja</option>
        <option value="0.20">Media</option>
        <option value="0.35" selected>Alta</option>
      </select>

      <label>Aire acondicionado</label>
      <select id="inv_ac">
        <option value="0" selected>No</option>
        <option value="0.10">Bajo</option>
        <option value="0.20">Medio</option>
        <option value="0.35">Alto</option>
      </select>
    </div>

    <!-- PRIMAVERA -->
    <div class="estacion">
      <h4>Primavera</h4>

      <label>Iluminación Natural</label>
      <select id="pri_ilum">
        <option value="-0.10">Más</option>
        <option value="0" selected>Normal</option>
        <option value="0.10">Menos</option>
      </select>

      <label>Calefacción</label>
      <select id="pri_heat">
        <option value="0" selected>No</option>
        <option value="0.10">Baja</option>
        <option value="0.20">Media</option>
        <option value="0.35">Alta</option>
      </select>

      <label>Aire acondicionado</label>
      <select id="pri_ac">
        <option value="0">No</option>
        <option value="0.10" selected>Bajo</option>
        <option value="0.20">Medio</option>
        <option value="0.35">Alto</option>
      </select>
    </div>

    <!-- VERANO -->
    <div class="estacion">
      <h4>Verano</h4>

      <label>Iluminación Natural</label>
      <select id="ver_ilum">
        <option value="-0.10" selected>Más</option>
        <option value="0">Normal</option>
        <option value="0.10">Menos</option>
      </select>

      <label>Calefacción</label>
      <select id="ver_heat">
        <option value="0" selected>No</option>
        <option value="0.10">Baja</option>
        <option value="0.20">Media</option>
        <option value="0.35">Alta</option>
      </select>

      <label>Aire acondicionado</label>
      <select id="ver_ac">
        <option value="0">No</option>
        <option value="0.10">Bajo</option>
        <option value="0.20">Medio</option>
        <option value="0.35" selected>Alto</option>
      </select>
    </div>

    <!-- OTOÑO -->
    <div class="estacion">
      <h4>Otoño</h4>

      <label>Iluminación Natural</label>
      <select id="oto_ilum">
        <option value="-0.10">Más</option>
        <option value="0" selected>Normal</option>
        <option value="0.10">Menos</option>
      </select>

      <label>Calefacción</label>
      <select id="oto_heat">
        <option value="0">No</option>
        <option value="0.10" selected>Baja</option>
        <option value="0.20">Media</option>
        <option value="0.35">Alta</option>
      </select>

      <label>Aire acondicionado</label>
      <select id="oto_ac">
        <option value="0" selected>No</option>
        <option value="0.10">Bajo</option>
        <option value="0.20">Medio</option>
        <option value="0.35">Alto</option>
      </select>
    </div>

  </div>
</div>

  <div class="section">
    <div class="block">
      <h3>OFFICE SUPPLIES (trimestrales)</h3>
      <div id="officeContainer"></div>
    </div>

     <div class="block">
      <h3>CLEANING SUPPLIES (trimestrales)</h3>
      <div> hola</div>
    </div>

  </div>


</div>

<div class="acciones">
  <button onclick="calcularElectricidad()">Electricidad</button>
  <button onclick="calcularAgua()">Agua</button>
  <button onclick="calcularOffice()">Office Supplies</button>
</div>

  <!-- RESULTADO -->
  <div class="resultado">
<div class="section">
    <pre id="result"></pre>
  </div>




</body>
</html>
