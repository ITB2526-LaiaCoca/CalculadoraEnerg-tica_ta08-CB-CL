<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Data Analysis Dashboard</title>

<style>
body { font-family: monospace; padding: 20px; }

.tabs {
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.tab {
  padding:8px 12px;
  border:1px solid #333;
  cursor:pointer;
  background:#eee;
}

.tab.active {
  background:#333;
  color:#fff;
}

.panel {
  display:none;
}

.panel.active {
  display:block;
}

details {
  border:1px solid #ccc;
  margin-bottom:10px;
  padding:10px;
}

summary {
  cursor:pointer;
  font-weight:bold;
}

pre {
  background:#f5f5f5;
  padding:10px;
  overflow:auto;
}

table {
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 25px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: left;
}

th {
  background: #f0f0f0;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="tab active" onclick="showTab(0)">📊 Análisis</div>
  <div class="tab" onclick="showTab(1)">📅 Datos crudos</div>
</div>

<button onclick="calcular()">Calcular</button>

<div id="panel0" class="panel active"></div>
<div id="panel1" class="panel"></div>

<script>

let data = [];

async function loadData() {
  const res = await fetch("dataclean.json");
  data = await res.json();
}

function showTab(i) {
  document.querySelectorAll(".tab").forEach((t,idx)=>{
    t.classList.toggle("active", idx===i);
  });

  document.querySelectorAll(".panel").forEach((p,idx)=>{
    p.classList.toggle("active", idx===i);
  });
}

function box(title, explanation, content) {
  return `
  <details open>
    <summary>${title}</summary>
    <div>
      <p><b>Explicación:</b> ${explanation}</p>
      <pre>${content}</pre>
    </div>
  </details>`;
}

// =========================================
// TABLA DINÁMICA (SIN COLUMNAS VACÍAS)
// =========================================
function buildTable(title, rows) {

  if (!rows.length) return "";

  let cols = {
    date:false,
    hour:false,
    description:false,
    value:false,
    category:false
  };

  rows.forEach(r => {
    if (r.date) cols.date = true;
    if (r.hour) cols.hour = true;
    if (r.description) cols.description = true;
    if (r.value) cols.value = true;
    if (r.category) cols.category = true;
  });

  let html = `<h3>${title}</h3><table><tr>`;

  if (cols.date) html += "<th>Fecha</th>";
  if (cols.hour) html += "<th>Hora</th>";
  if (cols.description) html += "<th>Descripción</th>";
  if (cols.value) html += "<th>Valor</th>";
  if (cols.category) html += "<th>Categoría</th>";

  html += "</tr>";

  rows.forEach(r => {
    html += "<tr>";

    if (cols.date) html += `<td>${r.date || ""}</td>`;
    if (cols.hour) html += `<td>${r.hour || ""}</td>`;
    if (cols.description) html += `<td>${r.description || ""}</td>`;
    if (cols.value) html += `<td>${r.value || ""}</td>`;
    if (cols.category) html += `<td>${r.category || ""}</td>`;

    html += "</tr>";
  });

  html += "</table>";
  return html;
}

function calcular() {

  let out = "";

  // ======================================
  // AGUA + ELECTRICIDAD
  // ======================================
  let agua = {};
  let elec = {};
  let horas = [];

  data.forEach(i => {

    if (i.category === "water" && i.consumption !== "") {
      agua[i.date] = (agua[i.date] || 0) + parseFloat(i.consumption);
      if (i.hour !== "") horas.push(parseFloat(i.consumption));
    }

    if (i.category === "pv_electricity" && i.consumption !== "") {
      elec[i.date] = (elec[i.date] || 0) + parseFloat(i.consumption);
    }
  });

  let mediaAgua =
    Object.values(agua).reduce((a,b)=>a+b,0)
    / Object.keys(agua).length;

  let mediaElec =
    Object.values(elec).reduce((a,b)=>a+b,0)
    / Object.keys(elec).length;

  let mediaHora =
    horas.reduce((a,b)=>a+b,0) / horas.length;

  let semanas = 39;
  let diasLectivos = semanas * 5 - 12;

  // ======================================
  // ANÁLISIS AGUA
  // ======================================
  let aguaText = "";
  for (let d in agua) aguaText += `${d}: ${agua[d]} L\n`;

  out += box(
    "CONSUMO DE AGUA",
    "Se suman consumos diarios del trimestre.",
    aguaText + `\nMedia diaria: ${mediaAgua.toFixed(2)} L`
  );

  out += box(
    "MEDIA POR HORA AGUA",
    "Promedio de consumos con hora registrada.",
    `Media: ${mediaHora.toFixed(2)} L/h`
  );

  out += box(
    "MEDIA SEMANAL AGUA",
    "Media diaria × 5 y × 7.",
    `5 días: ${(mediaAgua*5).toFixed(2)} L\n7 días: ${(mediaAgua*7).toFixed(2)} L`
  );

  // ======================================
  // ELECTRICIDAD
  // ======================================
  let elecText = "";
  for (let d in elec) elecText += `${d}: ${elec[d].toFixed(2)} kWh\n`;

  out += box(
    "CONSUMO ELECTRICIDAD",
    "Suma diaria del trimestre.",
    elecText + `\nMedia diaria: ${mediaElec.toFixed(2)} kWh`
  );

  out += box(
    "MEDIA SEMANAL ELECTRICIDAD",
    "Media diaria × 5 y × 7.",
    `5 días: ${(mediaElec*5).toFixed(2)} kWh\n7 días: ${(mediaElec*7).toFixed(2)} kWh`
  );

  // ======================================
  // CURSO
  // ======================================
  out += box(
    "CURSO ESCOLAR AJUSTADO",
    "Estimación anual basada en media trimestral.",
    `Días: ${diasLectivos}\nAgua: ${(diasLectivos*mediaAgua).toFixed(2)} L\nElectricidad: ${(diasLectivos*mediaElec).toFixed(2)} kWh`
  );

  // ======================================
  // OFFICE + CLEANING (TRIMESTRAL GLOBAL)
  // ======================================
  let office = {};
  let clean = {};

  data.forEach(i => {

    let q = parseFloat(i.quantity || 0);
    let c = parseFloat(i.net_import || 0);

    if (i.category === "office_supply") {
      let p = i.description;
      if (!office[p]) office[p] = {qty:0,cost:0,count:0};
      office[p].qty += q;
      office[p].cost += c;
      office[p].count++;
    }

    if (i.category === "cleaning_product") {
      let p = i.description;
      if (!clean[p]) clean[p] = {qty:0,cost:0,count:0};
      clean[p].qty += q;
      clean[p].cost += c;
      clean[p].count++;
    }
  });

  let officeText = "";
  for (let p in office) {
    let d = office[p];
    let media = d.qty / d.count;

    officeText += `\n${p}\n`;
    officeText += `Media trimestral: ${media.toFixed(2)} unidades | ${d.cost.toFixed(2)} €\n`;
    officeText += `Curso (9 meses): ${(media*3).toFixed(2)} unidades | ${(d.cost*3).toFixed(2)} €\n`;
  }

  let cleanText = "";
  for (let p in clean) {
    let d = clean[p];
    let media = d.qty / d.count;

    cleanText += `\n${p}\n`;
    cleanText += `Media trimestral: ${media.toFixed(2)} unidades | ${d.cost.toFixed(2)} €\n`;
    cleanText += `Curso (9 meses): ${(media*3).toFixed(2)} unidades | ${(d.cost*3).toFixed(2)} €\n`;
  }

  out += box(
    "OFFICE SUPPLY (TRIMESTRAL GLOBAL)",
    "Todas las facturas representan un único trimestre completo.",
    officeText
  );

  out += box(
    "CLEANING PRODUCT (TRIMESTRAL GLOBAL)",
    "Todas las facturas representan un único trimestre completo.",
    cleanText
  );

  // ======================================
  // TABLAS CRUDAS
  // ======================================
  let waterRows = [];
  let elecRows = [];
  let officeRows = [];
  let cleanRows = [];

  data.forEach(i => {

    let value = i.consumption || i.quantity || "";

    let row = {
      date: i.date,
      hour: i.hour,
      description: i.description,
      value: value,
      category: i.category
    };

    if (i.category === "water") waterRows.push(row);
    else if (i.category === "pv_electricity") elecRows.push(row);
    else if (i.category === "office_supply") officeRows.push(row);
    else if (i.category === "cleaning_product") cleanRows.push(row);
  });

  let raw = "";
  raw += buildTable("💧 Agua", waterRows);
  raw += buildTable("⚡ Electricidad", elecRows);
  raw += buildTable("🧾 Office Supply", officeRows);
  raw += buildTable("🧼 Cleaning Product", cleanRows);

  document.getElementById("panel0").innerHTML = out;
  document.getElementById("panel1").innerHTML = raw;
}

loadData();

</script>

</body>
</html>
