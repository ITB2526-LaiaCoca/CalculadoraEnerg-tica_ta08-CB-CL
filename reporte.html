<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reporte de Consumos y Compras</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f5f5f5;
    font-size: 12px; /* Texto más pequeño */
  }
  h1 {
    text-align: center;
    color: #333;
    font-size: 18px; /* Título principal más pequeño */
  }
  h2 {
    font-size: 14px; /* Subtítulos más pequeños */
  }
  a {
    display: inline-block;
    margin-bottom: 15px;
    color: #007BFF;
    text-decoration: none;
    font-weight: bold;
    font-size: 12px; /* Enlaces más pequeños */
  }
  a:hover {
    text-decoration: underline;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 30px;
    background-color: #fff;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
    font-size: 11px; /* Texto de la tabla más pequeño */
  }
  th, td {
    padding: 6px 10px; /* Reduce padding para compactar tabla */
    border: 1px solid #ddd;
    text-align: center;
  }
  th {
    background-color: #007BFF;
    color: #fff;
    font-size: 12px; /* Cabecera de tabla más pequeña */
  }
  tr:nth-child(even) {
    background-color: #f9f9f9;
  }
</style>
</head>
<body>

<h1>Reporte de Consumos y Compras</h1>
<a href="index.html">Volver a la Calculadora</a>

<div id="tablas"></div>

<script>
async function cargarDatos() {
  const response = await fetch('dataclean.json');
  const datos = await response.json();

  // Separar por categoría
  const categorias = {};
  datos.forEach(item => {
    if (!categorias[item.category]) categorias[item.category] = [];
    categorias[item.category].push(item);
  });

  const contenedor = document.getElementById('tablas');

  for (const cat in categorias) {
    const tablaDatos = categorias[cat];

    // Crear título por categoría
    const titulo = document.createElement('h2');
    titulo.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
    contenedor.appendChild(titulo);

    // Crear tabla
    const table = document.createElement('table');

    // Cabecera según keys del primer objeto
    const thead = document.createElement('thead');
    const trHead = document.createElement('tr');
    Object.keys(tablaDatos[0]).forEach(key => {
      const th = document.createElement('th');
      th.textContent = key;
      trHead.appendChild(th);
    });
    thead.appendChild(trHead);
    table.appendChild(thead);

    // Cuerpo de la tabla
    const tbody = document.createElement('tbody');
    tablaDatos.forEach(item => {
      const tr = document.createElement('tr');
      Object.keys(item).forEach(key => {
        const td = document.createElement('td');
        td.textContent = item[key] !== "" ? item[key] : "-";
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    contenedor.appendChild(table);
  }
}

// Cargar los datos al abrir la página
cargarDatos();
</script>

</body>
</html>
