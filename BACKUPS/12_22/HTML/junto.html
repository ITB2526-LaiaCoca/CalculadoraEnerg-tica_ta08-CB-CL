<h1>Dashboard Energía y Agua</h1>

<h2>CALCULADORA</h2>

<label>Fecha inicio:</label>
<input type="date" id="start">

<label>Fecha fin:</label>
<input type="date" id="end">

<br><br>

<label>Paneles solares:</label>
<input type="number" id="panels" value="136">

<hr>

<h3>FACTORES ESTACIONALES</h3>

<!-- INVIERNO -->
<h4>Invierno</h4>

<label>Iluminación</label>
<select id="inv_ilum">
  <option value="-0.10">Menos iluminación</option>
  <option value="0" selected>Normal</option>
  <option value="0.10">Más iluminación</option>
</select>

<label>Calefacción</label>
<select id="inv_heat">
  <option value="0">No</option>
  <option value="0.10">Baja</option>
  <option value="0.20" selected>Media</option>
  <option value="0.35">Alta</option>
</select>

<label>Aire acondicionado</label>
<select id="inv_ac">
  <option value="0" selected>No</option>
  <option value="0.10">Bajo</option>
  <option value="0.20">Medio</option>
  <option value="0.35">Alto</option>
</select>
