<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="../JS/juntoScript.js" defer></script>
  <title>Dashboard Energía y Agua</title>

  <style>
    #calendar {
      width: 260px;
      font-family: Arial;
      border: 1px solid #ccc;
      padding: 8px;
    }

    .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-top: 8px;
    }

    .day {
      text-align: center;
      padding: 4px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
    }

    .day.festivo {
      background: #ff6b6b;
      color: white;
    }

    .day.selected {
      outline: 2px solid black;
    }

    button.small {
      font-size: 12px;
      margin: 2px;
    }

    h3, h4 {
    margin: 0;
    }


  </style>
</head>

<body>

<a href="../index.html">index</a>
<a href="electricity.html">electricity</a>
<a href="water.html">water</a>

<h1>Dashboard Energía y Agua</h1>

<hr>

<h2>CALENDARIO FESTIVOS</h2>

<div id="calendar">

  <div class="cal-header">
    <button onclick="changeMonth(-1)">◀</button>
    <div id="monthLabel"></div>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="grid" id="daysHeader">
    <div>L</div><div>M</div><div>X</div><div>J</div><div>V</div><div>S</div><div>D</div>
  </div>

  <div class="grid" id="calendarGrid"></div>

  <button class="small" onclick="toggleSelected()">Añadir / Quitar festivo</button>
</div>

<textarea id="festivos_input" style="display:none"></textarea>

<hr>

<h2>CALCULADORA</h2>

<label>Fecha inicio:</label>
<input type="date" id="start">

<label>Fecha fin:</label>
<input type="date" id="end">

<br><br>

<label>Paneles solares:</label>
<input type="number" id="panels" value="136">

<hr>

<h3>GASTOS ESTACIONALES</h3>


<!-- INVIERNO -->
<h4>Invierno</h4>

<label>Iluminación</label>
<select id="inv_ilum">
  <option value="-0.10">Menos iluminación</option>
  <option value="0">Normal</option>
  <option value="0.10" selected>Más iluminación</option>
</select>

<label>Calefacción</label>
<select id="inv_heat">
  <option value="0">No</option>
  <option value="0.10">Baja</option>
  <option value="0.20">Media</option>
  <option value="0.35" selected>Alta</option>
</select>

<label>Aire acondicionado</label>
<select id="inv_ac">
  <option value="0" selected>No</option>
  <option value="0.10">Bajo</option>
  <option value="0.20">Medio</option>
  <option value="0.35">Alto</option>
</select>

<br><br>

<!-- PRIMAVERA -->
<h4>Primavera</h4>

<label>Iluminación</label>
<select id="pri_ilum">
  <option value="-0.10">Menos iluminación</option>
  <option value="0" selected>Normal</option>
  <option value="0.10">Más iluminación</option>
</select>

<label>Calefacción</label>
<select id="pri_heat">
  <option value="0" selected>No</option>
  <option value="0.10">Baja</option>
  <option value="0.20">Media</option>
  <option value="0.35">Alta</option>
</select>

<label>Aire acondicionado</label>
<select id="pri_ac">
  <option value="0">No</option>
  <option value="0.10" selected>Bajo</option>
  <option value="0.20">Medio</option>
  <option value="0.35">Alto</option>
</select>

<br><br>

<!-- VERANO -->
<h4>Verano</h4>

<label>Iluminación</label>
<select id="ver_ilum">
  <option value="-0.10" selected>Menos iluminación</option>
  <option value="0">Normal</option>
  <option value="0.10">Más iluminación</option>
</select>

<label>Calefacción</label>
<select id="ver_heat">
  <option value="0" selected>No</option>
  <option value="0.10">Baja</option>
  <option value="0.20">Media</option>
  <option value="0.35">Alta</option>
</select>

<label>Aire acondicionado</label>
<select id="ver_ac">
  <option value="0">No</option>
  <option value="0.10">Bajo</option>
  <option value="0.20">Medio</option>
  <option value="0.35" selected>Alto</option>
</select>

<br><br>

<!-- OTOÑO -->
<h4>Otoño</h4>

<label>Iluminación</label>
<select id="oto_ilum">
  <option value="-0.10">Menos iluminación</option>
  <option value="0" selected>Normal</option>
  <option value="0.10">Más iluminación</option>
</select>

<label>Calefacción</label>
<select id="oto_heat">
  <option value="0">No</option>
  <option value="0.10" selected>Baja</option>
  <option value="0.20">Media</option>
  <option value="0.35">Alta</option>
</select>

<label>Aire acondicionado</label>
<select id="oto_ac">
  <option value="0" selected>No</option>
  <option value="0.10">Bajo</option>
  <option value="0.20">Medio</option>
  <option value="0.35">Alto</option>
</select>

<br><br>

<button onclick="calcularElectricidad()">Electricidad</button>
<button onclick="calcularAgua()">Agua</button>

<hr>

<pre id="result"></pre>

</body>
</html>
